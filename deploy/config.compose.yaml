http:
  addr: ':8080'
  read_timeout: '15s'
  write_timeout: '60s'

logging:
  level: 'info'
  http_access_log_enabled: true
  http_slow_request_threshold: '500ms'

ai:
  price_rule: '>= 20'
  confidence_rule: '< 0.75'
  score_rule: '>= 7.5'

imageproc:
  card_normalize: true
  strict_card_normalize: false
  debug_normalize:
    enabled: false
    output_dir: ''

openai:
  base_url: 'http://ollama:11434/v1'
  api_key: ''
  # Surface assist is multimodal; pick a vision model (llava, qwen2-vl, etc.). qwen2.5:7b is text-only.
  model: 'qwen2.5:7b'

market:
  cardmarket_base_url: 'https://apiv2.cardmarket.com/ws/v2.0'
  cardmarket_http_timeout: '20s'
  cardmarket_singles_cache_ttl: '1h'
  cardmarket_id_game: 3
  cardmarket_app_token: ''
  cardmarket_app_secret: ''
  cardmarket_access_token: ''
  cardmarket_access_token_secret: ''
  tcg_set_to_expansion: {}

pokemontcg:
  base_url: 'https://api.pokemontcg.io/v2'
  api_key: ''
  fallback_requests_per_min: 15

mcp:
  enable: false
