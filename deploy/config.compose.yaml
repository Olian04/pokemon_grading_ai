http:
  addr: ':8080'
  read_timeout: '15s'
  write_timeout: '60s'

logging:
  level: 'info'
  http_access_log_enabled: true
  http_slow_request_threshold: '500ms'

ai:
  price_rule: '>= 20'
  confidence_rule: '< 0.75'
  score_rule: '>= 7.5'

openai:
  base_url: 'http://ollama:11434/v1'
  api_key: ''
  model: 'qwen2.5:7b'

market:
  cardmarket_base_url: 'https://api.cardmarket.com/ws/v2.0'
  cardmarket_api_key: ''

pokemontcg:
  base_url: 'https://api.pokemontcg.io/v2'
  api_key: ''
  fallback_requests_per_min: 15

mcp:
  enable: false
