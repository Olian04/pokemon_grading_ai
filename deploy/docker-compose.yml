services:
  api:
    image: golang:1.26
    working_dir: /app
    command: sh -c "go run ./cmd/api"
    volumes:
      - ..:/app
      - ./config.compose.yaml:/etc/pokemon-ai/config.yaml:ro
    environment:
      APP_CONFIG_FILE: '/etc/pokemon-ai/config.yaml'
    ports:
      - '8080:8080'
    depends_on:
      ollama-init:
        condition: service_completed_successfully
      ollama:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/healthz']
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 10s
      timeout: 5s
      retries: 20

  ollama-init:
    image: ollama/ollama:latest
    entrypoint: ['/bin/sh', '-c']
    command: >
      "until ollama list >/dev/null 2>&1; do sleep 2; done &&
       ollama pull qwen2.5:7b &&
       ollama run qwen2.5:7b \"ready\" >/dev/null 2>&1 || true"
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ollama_data:/root/.ollama

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    environment:
      OLLAMA_BASE_URL: 'http://ollama:11434'
      ENABLE_OPENAI_API: 'true'
      OPENAI_API_BASE_URL: 'http://api:8080'
    ports:
      - '3000:8080'
    depends_on:
      api:
        condition: service_healthy

volumes:
  ollama_data:
