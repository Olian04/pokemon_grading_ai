services:
  api:
    image: golang:1.24
    working_dir: /app
    command: sh -c "go run ./cmd/api"
    volumes:
      - ..:/app
    environment:
      HTTP_ADDR: ':8080'
      OPENAI_BASE_URL: 'http://ollama:11434/v1'
      OPENAI_MODEL: 'qwen2.5:7b'
      POKEMON_TCG_API_KEY: '${POKEMON_TCG_API_KEY:-}'
      ENABLE_MCP: '${ENABLE_MCP:-false}'
    ports:
      - '8080:8080'
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    environment:
      OLLAMA_BASE_URL: 'http://ollama:11434'
    ports:
      - '3000:8080'
    depends_on:
      - ollama

volumes:
  ollama_data:
