http:
  addr: ':8080'
  read_timeout: '15s'
  write_timeout: '60s'

logging:
  level: 'info'
  http_access_log_enabled: true
  http_slow_request_threshold: '500ms'

ai:
  price_rule: '>= 20'
  confidence_rule: '< 0.75'
  score_rule: '>= 7.5'

# Card detection + perspective dewarp before deterministic heuristics.
# When card_normalize is true, failure falls back to full-frame metrics unless strict_card_normalize is true.
# debug_normalize writes PNGs per pipeline step (sensitive); requires output_dir when enabled.
imageproc:
  card_normalize: true
  strict_card_normalize: false
  max_working_long_edge: 960
  warp_width: 800
  min_quad_area_ratio: 0.12
  max_quad_area_ratio: 0.92
  debug_normalize:
    enabled: false
    output_dir: ''

# EU pricing uses Cardmarket API 2.0 (OAuth 1.0a). Leave oauth fields empty to
# keep EU analytics explicit with unavailable_reason.
# Default host follows Cardmarket apiv2 guidance; override if your account docs differ.
market:
  cardmarket_base_url: 'https://apiv2.cardmarket.com/ws/v2.0'
  cardmarket_http_timeout: '20s'
  cardmarket_singles_cache_ttl: '1h'
  # Pokemon TCG on Cardmarket (confirm in MKM docs for your account).
  cardmarket_id_game: 3
  cardmarket_app_token: ''
  cardmarket_app_secret: ''
  cardmarket_access_token: ''
  cardmarket_access_token_secret: ''
  # Map Pokemon TCG API set codes (id prefix before the last "-") to Cardmarket idExpansion.
  tcg_set_to_expansion: {}

openai:
  # Any OpenAI-compatible endpoint. Examples:
  # - Ollama:   http://localhost:11434/v1
  # - LM Studio http://localhost:1234/v1
  # - Jan       http://localhost:1337/v1
  # - LocalAI   http://localhost:8080/v1
  base_url: 'http://localhost:11434/v1'
  api_key: ''
  # Surface assist sends images via OpenAI-style multimodal chat; use a vision-capable model
  # (e.g. llava, qwen2-vl, gpt-4o). Plain text chat models (e.g. qwen2.5:7b) will not see pixels.
  model: 'qwen2.5:7b'

pokemontcg:
  base_url: 'https://api.pokemontcg.io/v2'
  api_key: ''
  fallback_requests_per_min: 15

mcp:
  enable: false
